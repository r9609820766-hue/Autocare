<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Bookings - AutoCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
        }

        /* Navigation */
        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
        }

        .logo span {
            color: #e63946;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #e63946;
        }

        .book-btn {
            background: #e63946;
            color: white !important;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #e63946;
        }

        .book-btn:hover {
            background: transparent;
            color: #e63946 !important;
        }

        .menu-icon, .mobile-menu {
            display: none;
        }

        /* Page Header */
        .page-header {
            padding: 120px 5% 40px;
            text-align: center;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
        }

        .page-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .page-header h1 span {
            color: #e63946;
        }

        .page-header p {
            color: #aaa;
        }

        /* Search Section */
        .search-section {
            max-width: 500px;
            margin: 0 auto 2rem;
            padding: 0 5%;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 5px;
            border: 1px solid rgba(230,57,70,0.3);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box input:focus {
            outline: none;
        }

        .search-box button {
            background: #e63946;
            border: none;
            padding: 0 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #c1121f;
        }

        /* Bookings Container */
        .bookings-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 5% 3rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(230,57,70,0.3);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background: #e63946;
            border-color: #e63946;
        }

        /* Booking Card */
        .booking-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(230,57,70,0.2);
            transition: 0.3s;
        }

        .booking-card:hover {
            border-color: #e63946;
            transform: translateY(-2px);
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .booking-id {
            font-family: monospace;
            font-size: 0.9rem;
            background: rgba(230,57,46,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-pending {
            background: #ff9800;
            color: #1a1a1a;
        }

        .status-confirmed {
            background: #4caf50;
            color: white;
        }

        .status-completed {
            background: #2196f3;
            color: white;
        }

        .status-cancelled {
            background: #f44336;
            color: white;
        }

        .booking-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .detail-item i {
            width: 25px;
            color: #e63946;
        }

        .booking-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-outline-sm {
            background: transparent;
            border: 1px solid #e63946;
            color: #e63946;
        }

        .btn-outline-sm:hover {
            background: #e63946;
            color: white;
        }

        /* No Bookings */
        .no-bookings {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .no-bookings i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Footer */
        .footer {
            background: #050505;
            color: rgba(255,255,255,0.6);
            padding: 2rem 5%;
            text-align: center;
            border-top: 1px solid rgba(230,57,70,0.3);
        }

        .developer-credit {
            margin-top: 10px;
            font-size: 0.8rem;
        }

        .footer a {
            color: #e63946;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }
            .nav-links {
                display: none;
            }
            .menu-icon {
                display: block;
                font-size: 1.5rem;
                cursor: pointer;
                color: white;
            }
            .mobile-menu {
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                background: #0a0a0a;
                padding: 2rem;
                flex-direction: column;
                gap: 1rem;
                box-shadow: 0 10px 20px rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
                border-bottom: 1px solid #e63946;
            }
            .mobile-menu.show {
                display: flex;
            }
            .mobile-menu a {
                color: white;
                text-decoration: none;
                padding: 8px 0;
            }
            .booking-details {
                grid-template-columns: 1fr;
            }
            .booking-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .booking-actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
    <div class="logo">Auto<span>Care</span></div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="my-bookings.html" class="active">My Bookings</a>
        <a href="contact.html">Contact</a>
        <a href="admin-login.html" class="book-btn">Admin Login</a>
    </div>
    <div class="menu-icon" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="closeMenu()">Home</a>
    <a href="services.html" onclick="closeMenu()">Services</a>
    <a href="my-bookings.html" onclick="closeMenu()">My Bookings</a>
    <a href="contact.html" onclick="closeMenu()">Contact</a>
    <a href="admin-login.html" onclick="closeMenu()">Admin Login</a>
</div>

<!-- Page Header -->
<section class="page-header">
    <h1>My <span>Bookings</span></h1>
    <p>View and manage your service appointments</p>
</section>

<!-- Search Section -->
<div class="search-section">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by Booking ID, Vehicle or Mobile...">
        <button onclick="performSearch()"><i class="fas fa-search"></i></button>
    </div>
</div>

<!-- Tabs -->
<div class="tabs">
    <button class="tab-btn active" data-status="all" onclick="filterByStatus('all')">All Bookings</button>
    <button class="tab-btn" data-status="pending" onclick="filterByStatus('pending')">Pending</button>
    <button class="tab-btn" data-status="confirmed" onclick="filterByStatus('confirmed')">Confirmed</button>
    <button class="tab-btn" data-status="completed" onclick="filterByStatus('completed')">Completed</button>
    <button class="tab-btn" data-status="cancelled" onclick="filterByStatus('cancelled')">Cancelled</button>
</div>

<!-- Bookings Container -->
<div class="bookings-container" id="bookingsContainer">
    <!-- Bookings will be loaded here -->
</div>

<!-- Footer -->
<footer class="footer">
    <p>&copy; 2026 AutoCare - Professional Car Service Center. All rights reserved.</p>
    <div class="developer-credit">
        <p>Programming by <strong>Rupam Das</strong> | <a href="https://www.indianweb.online" target="_blank">www.indianweb.online</a></p>
    </div>
</footer>

<script>
    let allBookings = [];
    let currentStatus = "all";
    let currentSearch = "";

    // Load bookings from localStorage
    function loadBookings() {
        allBookings = JSON.parse(localStorage.getItem("garageBookings")) || [];
        applyFiltersAndRender();
    }

    function applyFiltersAndRender() {
        let filtered = [...allBookings];
        
        // Filter by status
        if (currentStatus !== "all") {
            filtered = filtered.filter(b => b.status === currentStatus);
        }
        
        // Filter by search
        if (currentSearch) {
            filtered = filtered.filter(b => 
                b.bookingId.toLowerCase().includes(currentSearch) ||
                b.vehicleNumber.toLowerCase().includes(currentSearch) ||
                b.vehicleModel.toLowerCase().includes(currentSearch) ||
                b.customerMobile.includes(currentSearch)
            );
        }
        
        // Sort by date (newest first)
        filtered.sort((a, b) => new Date(b.bookingTime) - new Date(a.bookingTime));
        
        renderBookings(filtered);
    }

    function renderBookings(bookings) {
        const container = document.getElementById("bookingsContainer");
        
        if (bookings.length === 0) {
            container.innerHTML = `
                <div class="no-bookings">
                    <i class="fas fa-calendar-times"></i>
                    <h3>No Bookings Found</h3>
                    <p>You haven't booked any service yet.</p>
                    <a href="services.html" class="btn-primary" style="display: inline-block; margin-top: 1rem; background:#e63946; color:white; padding:10px 20px; border-radius:30px; text-decoration:none;">Book a Service</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = bookings.map(booking => {
            const statusClass = getStatusClass(booking.status);
            const statusText = getStatusText(booking.status);
            
            return `
                <div class="booking-card">
                    <div class="booking-header">
                        <span class="booking-id"><i class="fas fa-receipt"></i> ${booking.bookingId}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="booking-details">
                        <div class="detail-item">
                            <i class="fas fa-wrench"></i>
                            <span>${booking.serviceName}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-car"></i>
                            <span>${booking.vehicleModel} (${booking.vehicleNumber})</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-calendar"></i>
                            <span>${booking.serviceDate}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-clock"></i>
                            <span>${booking.timeSlot}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-user"></i>
                            <span>${booking.customerName}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-phone"></i>
                            <span>${booking.customerMobile}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-rupee-sign"></i>
                            <span>Total: ₹${booking.totalAmount}</span>
                        </div>
                    </div>
                    <div class="booking-actions">
                        ${booking.status === "pending" || booking.status === "confirmed" ? `
                            <button class="btn-sm btn-danger" onclick="cancelBooking('${booking.bookingId}')">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    function getStatusClass(status) {
        switch(status) {
            case 'pending': return 'status-pending';
            case 'confirmed': return 'status-confirmed';
            case 'completed': return 'status-completed';
            case 'cancelled': return 'status-cancelled';
            default: return 'status-pending';
        }
    }

    function getStatusText(status) {
        switch(status) {
            case 'pending': return '⏳ Pending';
            case 'confirmed': return '✅ Confirmed';
            case 'completed': return '✓ Completed';
            case 'cancelled': return '❌ Cancelled';
            default: return 'Pending';
        }
    }

    function cancelBooking(bookingId) {
        if (confirm("Are you sure you want to cancel this booking?")) {
            let bookings = JSON.parse(localStorage.getItem("garageBookings")) || [];
            const index = bookings.findIndex(b => b.bookingId === bookingId);
            if (index !== -1) {
                bookings[index].status = "cancelled";
                localStorage.setItem("garageBookings", JSON.stringify(bookings));
                loadBookings();
                showToast("Booking cancelled successfully!");
            }
        }
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.innerText = message;
        toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#4caf50; color:white; padding:10px 20px; border-radius:30px; z-index:2000;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Search handler
    function performSearch() {
        currentSearch = document.getElementById("searchInput").value.toLowerCase();
        applyFiltersAndRender();
    }

    // Filter by status
    function filterByStatus(status) {
        currentStatus = status;
        
        // Update active tab style
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.classList.remove("active");
            if (btn.getAttribute("data-status") === status) {
                btn.classList.add("active");
            }
        });
        
        applyFiltersAndRender();
    }

    // Search input enter key
    document.getElementById("searchInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            performSearch();
        }
    });

    // Mobile Menu Functions
    function toggleMobileMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }
    
    function closeMenu() {
        document.getElementById('mobileMenu').classList.remove('show');
    }

    // Initial load
    loadBookings();
</script>
</body>
</html>
